name: Bug Report
description: 버그 제보 템플릿
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        재현 가능한 정보 중심으로 작성해주세요.
  - type: input
    id: summary
    attributes:
      label: 요약
      placeholder: 어떤 문제가 발생했나요?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 절차
      placeholder: 1) ... 2) ... 3) ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 결과
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 환경
      placeholder: OS/브라우저/앱 버전
